name: CI
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: panw-takehome
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --alluredir=allure-results --junitxml=junit.xml

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: allure-results
          allure_report: allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Test summary
        if: always()
        run: |
          python - <<'PY' >> $GITHUB_STEP_SUMMARY
          import xml.etree.ElementTree as ET
          r = ET.parse("junit.xml").getroot()
          attrs = r.attrib if r.tag == "testsuite" else r[0].attrib
          print(f"### Test Results")
          print(f"- Tests: {attrs.get('tests', '?')}")
          print(f"- Failures: {attrs.get('failures', '?')}")
          print(f"- Errors: {attrs.get('errors', '?')}")
          print(f"- Skipped: {attrs.get('skipped', '?')}")
          PY
