name: CI
on: [push]

permissions:
  contents: write  # needed for peaceiris/actions-gh-pages to push to gh-pages branch

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: panw-takehome
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --alluredir=allure-results --junitxml=junit.xml

      - name: Install Allure CLI
        if: always()
        run: |
          wget -qO /tmp/allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          sudo tar -xzf /tmp/allure.tgz -C /opt
          sudo ln -s /opt/allure-2.29.0/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: panw-takehome/allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: panw-takehome/allure-report
          publish_branch: gh-pages

      - name: Test summary
        if: always()
        run: |
          python - <<'PY' >> $GITHUB_STEP_SUMMARY
          import xml.etree.ElementTree as ET, os
          path = "junit.xml"
          if not os.path.exists(path):
              print("### Test Results\n- junit.xml not found (tests may not have run)")
          else:
              r = ET.parse(path).getroot()
              attrs = r.attrib if r.tag == "testsuite" else r[0].attrib
              print(f"### Test Results")
              print(f"- Tests: {attrs.get('tests', '?')}")
              print(f"- Failures: {attrs.get('failures', '?')}")
              print(f"- Errors: {attrs.get('errors', '?')}")
              print(f"- Skipped: {attrs.get('skipped', '?')}")
          PY
